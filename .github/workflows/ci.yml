name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-24.04-arm
    container: alpine:edge

    steps:
      - name: Install build deps
        run: apk add --no-cache git make musl-dev gcc bash hare hare-json

      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Test
        run: make test

  vscode-extension:
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      # `npm run package` runs `tsc -p ./` (typecheck + emit) then
      # `vsce package`, so it covers both compile errors and packaging
      # regressions in one shot.
      - name: Typecheck and package
        run: npm run package
