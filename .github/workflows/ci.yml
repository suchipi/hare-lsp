name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      # GHA refuses to run JavaScript actions inside Alpine on arm64
      # ("JavaScript Actions in Alpine containers are only supported on x64
      # Linux runners"), so we can't use `container: alpine:edge`. Instead
      # we run the build inside an Alpine container via `docker run`, which
      # the host's docker handles fine on arm64.
      - name: Build and test in Alpine
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace alpine:edge sh -c '
            set -eux
            apk add --no-cache git make musl-dev gcc bash hare hare-json
            make
            make test
          '

  vscode-extension:
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      # `npm run package` runs `tsc -p ./` (typecheck + emit) then
      # `vsce package`, so it covers both compile errors and packaging
      # regressions in one shot.
      - name: Typecheck and package
        run: npm run package
