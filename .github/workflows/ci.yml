name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detect whether any non-markdown files changed. The build/test jobs key
  # off this so docs-only PRs skip the expensive work, while the final
  # `ci` job always runs and can be used as the required status check.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'

  server:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # x64 free runners have 16 GB RAM; the arm64 partner runners only have
    # 8 GB, and qbe compiling the server module overruns that even with
    # -j1.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      # We run the build inside a container based on alpine:edge rather
      # than using `container: alpine:edge` at the job level so
      # actions/checkout executes on the host and doesn't have to deal
      # with musl/node quirks.
      #
      # The image (alpine:edge + apk packages) is built once and cached
      # via the GitHub Actions cache backend, so subsequent runs skip
      # the apk install layer entirely when alpine:edge's digest and
      # the package list are unchanged.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cached test image
        uses: docker/build-push-action@v7
        with:
          context: .github/docker
          tags: hare-lsp-ci:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and test in Alpine
        # Trying without HAREFLAGS=-j1 to see whether the qbe-per-CPU
        # memory pressure that motivated it still trips on the 16 GB
        # x64 runners. Revert this commit if the runner OOMs.
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace hare-lsp-ci:latest sh -c '
            set -eux
            free -m
            make
            make test
          '

  vscode-extension:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      # Runs the vitest suite (currently the terminal-output parser
      # that drives the test-status gutter). Kept separate from the
      # `server` job because users running hare-lsp from non-VSCode
      # editors shouldn't need Node to run `make test`.
      - name: Run vitest suite
        run: make vscode-test

      # `npm run package` runs `tsc --noEmit` (typecheck), then vitest,
      # then esbuild (bundle), then `vsce package`, so it covers compile
      # errors, tests, bundling, and packaging regressions in one shot.
      - name: Typecheck and package
        working-directory: editors/vscode
        run: npm run package

  # Single aggregator job that always runs. Use this as the required
  # status check in branch protection: it passes when the real jobs
  # succeed or were skipped (docs-only change), and fails if any of
  # them failed or was cancelled.
  ci:
    if: always()
    needs: [changes, server, vscode-extension]
    runs-on: ubuntu-24.04
    steps:
      - name: Check job results
        run: |
          set -eu
          changes='${{ needs.changes.result }}'
          server='${{ needs.server.result }}'
          vscode='${{ needs.vscode-extension.result }}'
          echo "changes=$changes server=$server vscode-extension=$vscode"
          if [ "$changes" != "success" ]; then
            echo "changes job did not succeed"
            exit 1
          fi
          for r in "$server" "$vscode"; do
            case "$r" in
              success|skipped) ;;
              *) echo "dependent job result: $r"; exit 1 ;;
            esac
          done
